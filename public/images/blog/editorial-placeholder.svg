<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title description">
  <title id="title">Editorial image placeholder</title>
  <desc id="description">A clearly marked placeholder for a planned editorial illustration or photograph.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#edf9f9"/>
    </linearGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" fill="none" stroke="#cdd6d6" stroke-width="1" opacity="0.7"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#background)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <path d="M80 720 440 430l220 180 280-300 580 410" fill="none" stroke="#3eb7bb" stroke-width="5" opacity="0.55"/>
  <circle cx="1220" cy="260" r="92" fill="none" stroke="#3eb7bb" stroke-width="5" opacity="0.55"/>
  <rect x="80" y="80" width="1440" height="740" fill="none" stroke="#a8b5b5" stroke-width="2" stroke-dasharray="12 14"/>
  <text x="800" y="425" fill="#2e9196" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24" letter-spacing="6" text-anchor="middle">EDITORIAL IMAGE PLACEHOLDER</text>
  <text x="800" y="470" fill="#4a5e5e" font-family="Arial, sans-serif" font-size="22" text-anchor="middle">Replace with the approved cover or supporting visual</text>
</svg>
